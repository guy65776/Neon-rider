<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Rider</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<script>

let player;
let scoreText;
let score = 0;
let touching = false;
let terrain = [];
let nextTerrainX = 0;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor:"#000000",
    physics:{
        default:"arcade",
        arcade:{
            gravity:{ y:1000 },
            debug:false
        }
    },
    scene:{
        create:create,
        update:update
    }
};

new Phaser.Game(config);

function create()
{
    const scene = this;

    // Terrain
    for(let i=0;i<25;i++)
    {
        spawnTerrain(scene);
    }

    // Player bike (simple rectangle)
    player = this.add.rectangle(
        200,
        300,
        80,
        30,
        0xffffff
    );

    this.physics.add.existing(player);

    player.body.setCollideWorldBounds(false);

    terrain.forEach(t =>
    {
        this.physics.add.collider(player,t);
    });

    scoreText = this.add.text(
        20,
        20,
        "Score: 0",
        {
            fontSize:"28px",
            color:"#00ffff"
        }
    );

    scoreText.setScrollFactor(0);

    this.input.on("pointerdown",()=>{
        touching = true;
    });

    this.input.on("pointerup",()=>{
        touching = false;
    });

    this.cameras.main.startFollow(player,true,0.08,0.08);
}

function spawnTerrain(scene)
{
    const width =
        Phaser.Math.Between(250,450);

    const height = 40;

    const y =
        Phaser.Math.Between(600,800);

    const angle =
        Phaser.Math.Between(-20,20);

    const block =
        scene.add.rectangle(
            nextTerrainX,
            y,
            width,
            height,
            0x111111
        );

    block.setStrokeStyle(
        4,
        0x00ffff
    );

    scene.physics.add.existing(
        block,
        true
    );

    block.angle = angle;

    terrain.push(block);

    nextTerrainX += width;
}

function update()
{
    if(touching)
    {
        player.body.setVelocityX(250);

        // flip while airborne
        if(!player.body.touching.down)
        {
            player.angle -= 4;
        }
    }

    score =
        Math.max(
            score,
            Math.floor(player.x / 10)
        );

    scoreText.setText(
        "Score: " + score
    );

    if(player.x > nextTerrainX - 3000)
    {
        spawnTerrain(this);
        this.physics.add.collider(
            player,
            terrain[terrain.length-1]
        );
    }
}

</script>

</body>
</html>
