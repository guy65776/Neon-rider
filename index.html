<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Rider - Smooth Terrain</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<script>

let bikeBody;
let frontWheel;
let rearWheel;

let bikeRect;
let frontCircle;
let rearCircle;

let scoreText;
let score = 0;
let touching = false;

const terrainPoints = [];
let terrainGraphics;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor:"#000000",

    physics:{
        default:"matter",
        matter:{
            gravity:{ y:1 },
            debug:false
        }
    },

    scene:{
        create:create,
        update:update
    }
};

new Phaser.Game(config);

function create()
{
    const scene = this;

    terrainGraphics = this.add.graphics();

    generateTerrain(scene);

    bikeBody =
        this.matter.add.rectangle(
            250,
            350,
            120,
            30
        );

    frontWheel =
        this.matter.add.circle(
            300,
            390,
            24
        );

    rearWheel =
        this.matter.add.circle(
            200,
            390,
            24
        );

    this.matter.add.constraint(
        bikeBody,
        frontWheel,
        55,
        0.9
    );

    this.matter.add.constraint(
        bikeBody,
        rearWheel,
        55,
        0.9
    );

    bikeRect =
        this.add.rectangle(
            0,0,120,30,0xffffff
        );

    bikeRect.setStrokeStyle(
        4,
        0xff00ff
    );

    frontCircle =
        this.add.circle(
            0,0,24,0x00ffff
        );

    rearCircle =
        this.add.circle(
            0,0,24,0x00ffff
        );

    scoreText =
        this.add.text(
            20,
            20,
            "Score: 0",
            {
                fontSize:"28px",
                color:"#00ffff"
            }
        );

    scoreText.setScrollFactor(0);

    this.cameras.main.startFollow(
        bikeRect,
        true,
        0.08,
        0.08
    );

    this.input.on(
        "pointerdown",
        ()=> touching = true
    );

    this.input.on(
        "pointerup",
        ()=> touching = false
    );
}

function generateTerrain(scene)
{
    let x = 0;
    let y = 700;

    terrainPoints.push({x,y});

    for(let i=0;i<300;i++)
    {
        x += 80;

        y += Phaser.Math.Between(
            -30,
            30
        );

        y = Phaser.Math.Clamp(
            y,
            500,
            850
        );

        terrainPoints.push({x,y});
    }

    terrainGraphics.clear();

    terrainGraphics.lineStyle(
        6,
        0x00ffff
    );

    terrainGraphics.beginPath();

    terrainGraphics.moveTo(
        terrainPoints[0].x,
        terrainPoints[0].y
    );

    for(let i=1;i<terrainPoints.length;i++)
    {
        terrainGraphics.lineTo(
            terrainPoints[i].x,
            terrainPoints[i].y
        );
    }

    terrainGraphics.strokePath();

    for(let i=0;i<terrainPoints.length-1;i++)
    {
        const p1 = terrainPoints[i];
        const p2 = terrainPoints[i+1];

        const midX =
            (p1.x+p2.x)/2;

        const midY =
            (p1.y+p2.y)/2;

        const length =
            Phaser.Math.Distance.Between(
                p1.x,p1.y,
                p2.x,p2.y
            );

        const angle =
            Phaser.Math.Angle.Between(
                p1.x,p1.y,
                p2.x,p2.y
            );

        scene.matter.add.rectangle(
            midX,
            midY,
            length,
            12,
            {
                isStatic:true,
                angle:angle
            }
        );
    }
}

function update()
{
    if(touching)
    {
        frontWheel.torque += 0.03;
        rearWheel.torque += 0.03;

        if(
            Math.abs(
                bikeBody.velocity.y
            ) > 2
        )
        {
            bikeBody.torque -= 0.06;
        }
    }

    bikeRect.x =
        bikeBody.position.x;

    bikeRect.y =
        bikeBody.position.y;

    bikeRect.rotation =
        bikeBody.angle;

    frontCircle.x =
        frontWheel.position.x;

    frontCircle.y =
        frontWheel.position.y;

    rearCircle.x =
        rearWheel.position.x;

    rearCircle.y =
        rearWheel.position.y;

    score =
        Math.max(
            score,
            Math.floor(
                bikeBody.position.x/10
            )
        );

    scoreText.setText(
        "Score: "+score
    );
}

</script>

</body>
</html>
